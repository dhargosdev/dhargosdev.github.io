
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards</title>
    <!-- Google Fonts (con fallbacks seguros en el CSS por si el instituto también lo bloquea) -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* CSS PURO - Sin dependencias externas */
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --secondary: #ec4899;
            --text-dark: #1e293b;
            --text-light: #f8fafc;
            --card-front-bg: #ffffff;
            --card-back-bg1: #fde047;
            --card-back-bg2: #fbbf24;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            color: var(--text-dark);
            /* Fondo con degradado animado */
            background: linear-gradient(-45deg, #4f46e5, #ec4899, #8b5cf6, #3b82f6);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            /* Evitar selección de texto */
            user-select: none;
            -webkit-user-select: none;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 100%;
            max-width: 42rem; /* 672px */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- HEADER --- */
        header {
            text-align: center;
            margin-bottom: 1.5rem;
            width: 100%;
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 800;
            color: white;
            margin-bottom: 0.5rem;
            text-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .subtitle {
            color: white;
            font-size: 1.125rem;
            font-weight: 700;
            opacity: 0.9;
        }

        .progress-container {
            margin-top: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.2);
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            color: white;
            font-weight: bold;
            backdrop-filter: blur(4px);
        }

        .progress-track {
            flex-grow: 1;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 9999px;
            height: 0.625rem; /* 10px */
            margin-left: 1rem;
            overflow: hidden;
        }

        .progress-bar {
            background: #facc15; /* yellow-400 */
            height: 100%;
            border-radius: 9999px;
            transition: width 0.3s ease;
            width: 2%;
        }

        /* --- TARJETA 3D --- */
        .card-scene {
            perspective: 1000px;
            width: 100%;
            margin-bottom: 2rem;
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 20rem;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .card-inner.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
            border: 4px solid;
        }

        .card-front {
            background: var(--card-front-bg);
            border-color: #e0e7ff; /* indigo-100 */
            box-shadow: inset 0 0 20px rgba(0,0,0,0.05);
        }

        .card-back {
            background: linear-gradient(135deg, var(--card-back-bg1), var(--card-back-bg2));
            border-color: #eab308; /* yellow-500 */
            transform: rotateY(180deg);
        }

        .badge {
            position: absolute;
            top: 1rem;
            left: 1.5rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 0.875rem;
        }

        .badge-front { color: #818cf8; /* indigo-400 */ }
        .badge-back { color: #854d0e; /* yellow-800 */ }

        .card-text {
            font-weight: 800;
            margin-top: 1rem;
        }

        .text-front {
            color: #312e81; /* indigo-900 */
            font-size: 1.5rem;
        }

        .text-back {
            color: #0f172a; /* slate-900 */
            font-size: 1.25rem;
        }

        .hint {
            position: absolute;
            bottom: 1rem;
            color: #94a3b8; /* slate-400 */
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        .hint svg {
            width: 1rem;
            height: 1rem;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }

        /* --- CONTROLES --- */
        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            width: 100%;
        }

        .btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: bold;
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            transition: transform 0.15s, background-color 0.2s;
            font-size: 1rem;
            font-family: inherit;
        }

        .btn:hover { transform: scale(1.05); }
        .btn:active { transform: scale(0.95); }

        .btn-nav {
            background: rgba(255, 255, 255, 0.9);
            color: var(--primary);
        }
        .btn-nav:hover { background: #ffffff; }
        
        .btn-nav.next { color: var(--secondary); }

        .btn-shuffle {
            background: var(--primary);
            color: white;
        }
        .btn-shuffle:hover { background: var(--primary-hover); }

        /* --- FOOTER --- */
        footer {
            margin-top: 2rem;
            color: rgba(255, 255, 255, 0.7);
            text-align: center;
            font-size: 0.875rem;
        }
        footer .small-text {
            margin-top: 0.25rem;
            font-size: 0.75rem;
        }

        /* Responsive adjustments */
        @media (min-width: 640px) {
            h1 { font-size: 3rem; }
            .card-inner { height: 24rem; }
            .text-front { font-size: 2.25rem; }
            .text-back { font-size: 1.875rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>🛡️ Ciberseguridad 👾</h1>
            <p class="subtitle">Repaso interactivo</p>
            
            <div class="progress-container">
                <span id="progress-text">Tarjeta 1 de 50</span>
                <div class="progress-track">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>
            </div>
        </header>

        <main class="card-scene" onclick="flipCard()">
            <div id="card-inner" class="card-inner">
                
                <!-- Cara Frontal (Pregunta) -->
                <div class="card-face card-front">
                    <span class="badge badge-front">🤔 Pregunta</span>
                    <div id="question-text" class="card-text text-front">
                        <!-- La pregunta se inserta aquí -->
                    </div>
                    <div class="hint">
                        <span>Toca la tarjeta para ver la respuesta</span>
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122"></path></svg>
                    </div>
                </div>

                <!-- Cara Trasera (Respuesta) -->
                <div class="card-face card-back">
                    <span class="badge badge-back">💡 Respuesta</span>
                    <div id="answer-text" class="card-text text-back">
                        <!-- La respuesta se inserta aquí -->
                    </div>
                </div>

            </div>
        </main>

        <nav class="controls">
            <button onclick="prevCard()" class="btn btn-nav">
                <span>◀️</span> Anterior
            </button>
            
            <button onclick="shuffleCards()" class="btn btn-shuffle">
                <span>🔀</span> Mezclar
            </button>

            <button onclick="nextCard()" class="btn btn-nav next">
                Siguiente <span>▶️</span>
            </button>
        </nav>
        
        <footer>
            <p>Departamento de Tecnología e Informática</p>
            <p class="small-text">Usa las flechas ⬅️ ➡️ y la barra espaciadora ␣</p>
        </footer>
    </div>

    <script>
const originalFlashcards = [
    { q: "🛡️ ¿Qué es la ciberseguridad?", a: "Conjunto de prácticas y herramientas para proteger sistemas informáticos y datos contra amenazas." },
    { q: "🖥️ ¿Qué tres elementos forman un sistema informático?", a: "Hardware, Software y Datos." },
    { q: "🧱 ¿Qué es el Hardware?", a: "Los componentes físicos del sistema, como el ordenador, tablet o router." },
    { q: "🖱️ ¿Qué es el Software?", a: "Los programas y sistemas operativos que hacen funcionar al hardware." },
    { q: "📂 ¿Qué representan los 'Datos' en un sistema?", a: "La información que se almacena y procesa: archivos, fotos, contraseñas, etc." },
    { q: "🏰 Según el esquema de la pizarra, ¿qué es el 'tesoro' del sistema?", a: "Los Datos." },
    { q: "🎭 ¿En qué consiste la suplantación de identidad?", a: "En hacerse pasar por otra persona de forma malintencionada en la red." },
    { q: "📱 ¿Qué es el ciberbullying?", a: "El acoso y las agresiones entre iguales a través de medios digitales." },
    { q: "⚠️ ¿Qué es el 'grooming'?", a: "Acoso de un adulto a un menor por Internet con fines sexuales." },
    { q: "📸 ¿A qué nos referimos con 'sexting'?", a: "Envío de imágenes o vídeos de contenido sexual propio a través del móvil." },
    { q: "🦠 ¿Qué es el Malware?", a: "Software malicioso diseñado para dañar, espiar o controlar un sistema sin permiso." },
    { q: "🐎 ¿Qué diferencia a un Troyano de un virus común?", a: "Se camufla dentro de un programa aparentemente inofensivo para infectar el equipo." },
    { q: "🕵️ ¿Qué hace el Spyware?", a: "Recopila información del usuario (contraseñas, historial) sin su consentimiento." },
    { q: "🎩 ¿Quiénes son los 'Black Hackers'?", a: "Ciberdelincuentes que vulneran sistemas para robar datos o lucrarse ilegalmente." },
    { q: "🧠 ¿En qué se basa la Ingeniería Social?", a: "En manipular y engañar a los usuarios para conseguir su información confidencial." },
    { q: "🎣 ¿Qué es el Phishing?", a: "Estafa por correo o web falsa para obtener datos bancarios o claves." },
    { q: "📞 ¿Qué es el Vishing?", a: "Un engaño similar al phishing pero realizado a través de llamadas telefónicas." },
    { q: "🛡️ ¿Para qué sirve un Antivirus?", a: "Programa que detecta y elimina virus comparando archivos con una base de datos." },
    { q: "🔥 ¿Qué es un Cortafuegos o Firewall?", a: "Sistema de defensa que controla y filtra el tráfico de entrada y salida de una red." },
    { q: "🕊️ ¿Qué es el Hacking Ético (White Hacking)?", a: "Actividad de expertos que ayudan a empresas a mejorar su seguridad buscando fallos." },
    { q: "🔐 ¿Qué es la Criptografía?", a: "El cifrado de la información para proteger archivos, comunicaciones y claves." },
    { q: "🖐️ Pon un ejemplo de Biometría.", a: "Identificación mediante huella digital, reconocimiento facial o lectura de retina." },
    { q: "📲 ¿Qué es la Autenticación de Doble Factor?", a: "Sistema que pide una segunda clave enviada a un dispositivo distinto para entrar en una cuenta." },
    { q: "📜 ¿Qué es un Certificado Digital?", a: "Documento digital que identifica a una persona de forma válida en trámites online." },
    { q: "✍️ ¿Qué validez tiene la Firma Electrónica?", a: "La misma validez legal que una firma manuscrita." },
    { q: "🤝 ¿Qué es la Netiqueta?", a: "Conjunto de normas de comportamiento respetuoso que debemos seguir en la Red." },
    { q: "👹 ¿Qué es un 'trol' en Internet?", a: "Persona que ampara su identidad para provocar o molestar a otros usuarios." },
    { q: "📶 ¿Por qué hay que vigilar las redes Wi-Fi públicas?", a: "Porque los atacantes pueden imitar sus nombres para interceptar tus comunicaciones." },
    { q: "🔒 ¿Qué debemos comprobar en el navegador para saber que un sitio es seguro?", a: "Que la dirección empiece por 'https' y tenga un candado." },
    { q: "📰 ¿Cómo evitar las Fake News?", a: "Investigando la fuente, buscando al autor y contrastando con otras noticias." },
    { q: "👣 ¿Qué es la Identidad Digital?", a: "La imagen que proyectamos en Internet con lo que publicamos y compartimos." },
    { q: "⚖️ ¿Qué ley protege las creaciones originales en España?", a: "La Ley de Propiedad Intelectual (LPI)." },
    { q: "©️ ¿Qué significa la licencia Copyright?", a: "Que todos los derechos de la obra están reservados para el autor." },
    { q: "🔄 ¿Qué permite la licencia Copyleft?", a: "Modificar y redistribuir la obra, siempre que la nueva versión use la misma licencia." },
    { q: "🟢 ¿Qué son las licencias Creative Commons?", a: "Permiten ciertos usos de la obra bajo las condiciones que establezca el autor." },
    { q: "🍼 ¿Qué es un programa de Control Parental?", a: "Software diseñado para proteger a los menores limitando tiempos y contenidos en la red." },
    { q: "🔑 ¿Cómo debe ser una contraseña segura?", a: "Larga, con mezcla de mayúsculas, minúsculas, números y símbolos." },
    { q: "🖇️ ¿Qué precaución debemos tener con los adjuntos en correos sospechosos?", a: "No abrirlos ni descargarlos nunca si la fuente no es confiable." },
    { q: "🏢 ¿Qué es el 'Cloud Center Andalucía' mencionado en el libro?", a: "Un centro de datos y proveedor de servicios ubicado en Granada." },
    { q: "🚫 ¿Podemos usar cualquier imagen de Internet libremente?", a: "No, debemos citar la fuente y respetar la licencia que tenga el contenido." },
    { q: "💰 ¿Qué es el Ransomware?", a: "Malware que bloquea tus archivos y exige un rescate económico para recuperarlos." },
    { q: "🐛 ¿Qué diferencia a un Gusano (Worm) de un virus?", a: "Se propaga por la red de forma automática sin necesidad de infectar otros archivos." },
    { q: "⌨️ ¿Qué hace un Keylogger?", a: "Programa que registra cada pulsación del teclado para robar contraseñas y datos bancarios." },
    { q: "📺 ¿Qué es el Adware?", a: "Software diseñado para mostrar publicidad no deseada de forma invasiva en el equipo." },
    { q: "💾 ¿Para qué sirve una Copia de Seguridad (Backup)?", a: "Para disponer de un duplicado de los datos en caso de pérdida, robo o fallo del sistema." },
    { q: "🔄 ¿Por qué son importantes las Actualizaciones de Seguridad?", a: "Porque corrigen 'agujeros' o vulnerabilidades que los atacantes podrían aprovechar." },
    { q: "🏠 ¿Qué es el Internet de las Cosas (IoT)?", a: "Objetos cotidianos (relojes, cámaras, luces) conectados a la red que también requieren seguridad." },
    { q: "📧 ¿A qué llamamos SPAM?", a: "Correo basura no solicitado, enviado masivamente, que puede contener enlaces maliciosos." },
    { q: "🗺️ ¿En qué consiste el Pharming?", a: "Técnica que redirige al usuario a una web falsa aunque escriba bien la dirección en el navegador." },
    { q: "👣 ¿Qué es la Huella Digital?", a: "El rastro de datos e información que dejamos al navegar e interactuar en Internet." }
];

        let flashcards = [...originalFlashcards];
        let currentIndex = 0;
        let isFlipped = false;

        const cardInner = document.getElementById('card-inner');
        const questionText = document.getElementById('question-text');
        const answerText = document.getElementById('answer-text');
        const progressText = document.getElementById('progress-text');
        const progressBar = document.getElementById('progress-bar');

        function init() {
            updateCard();
        }

        function flipCard() {
            isFlipped = !isFlipped;
            if (isFlipped) {
                cardInner.classList.add('is-flipped');
            } else {
                cardInner.classList.remove('is-flipped');
            }
        }

        function updateCard() {
            if (isFlipped) {
                isFlipped = false;
                cardInner.classList.remove('is-flipped');
                setTimeout(() => {
                    renderText();
                }, 300);
            } else {
                renderText();
            }
        }

        function renderText() {
            questionText.innerText = flashcards[currentIndex].q;
            answerText.innerText = flashcards[currentIndex].a;
            
            const currentNum = currentIndex + 1;
            const total = flashcards.length;
            progressText.innerText = `Tarjeta ${currentNum} de ${total}`;
            progressBar.style.width = `${(currentNum / total) * 100}%`;
        }

        function nextCard() {
            currentIndex++;
            if (currentIndex >= flashcards.length) {
                currentIndex = 0;
            }
            updateCard();
        }

        function prevCard() {
            currentIndex--;
            if (currentIndex < 0) {
                currentIndex = flashcards.length - 1;
            }
            updateCard();
        }

        function shuffleCards() {
            for (let i = flashcards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [flashcards[i], flashcards[j]] = [flashcards[j], flashcards[i]];
            }
            currentIndex = 0;
            
            cardInner.style.transform = 'scale(0.95)';
            
            setTimeout(() => {
                cardInner.style.transform = ''; 
                updateCard();
            }, 150);
        }

        document.addEventListener('keydown', (event) => {
            if (event.key === 'ArrowRight') {
                nextCard();
            } else if (event.key === 'ArrowLeft') {
                prevCard();
            } else if (event.key === ' ' || event.key === 'Spacebar') {
                event.preventDefault();
                flipCard();
            }
        });

        init();
    </script>
</body>
</html>
