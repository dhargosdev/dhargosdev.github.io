<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards: Seguridad en Internet - 4º ESO</title>
    <!-- Google Fonts (con fallbacks seguros en el CSS por si el instituto también lo bloquea) -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* CSS PURO - Sin dependencias externas */
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --secondary: #ec4899;
            --text-dark: #1e293b;
            --text-light: #f8fafc;
            --card-front-bg: #ffffff;
            --card-back-bg1: #fde047;
            --card-back-bg2: #fbbf24;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            color: var(--text-dark);
            /* Fondo con degradado animado */
            background: linear-gradient(-45deg, #4f46e5, #ec4899, #8b5cf6, #3b82f6);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            /* Evitar selección de texto */
            user-select: none;
            -webkit-user-select: none;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 100%;
            max-width: 42rem; /* 672px */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- HEADER --- */
        header {
            text-align: center;
            margin-bottom: 1.5rem;
            width: 100%;
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 800;
            color: white;
            margin-bottom: 0.5rem;
            text-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .subtitle {
            color: white;
            font-size: 1.125rem;
            font-weight: 700;
            opacity: 0.9;
        }

        .progress-container {
            margin-top: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.2);
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            color: white;
            font-weight: bold;
            backdrop-filter: blur(4px);
        }

        .progress-track {
            flex-grow: 1;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 9999px;
            height: 0.625rem; /* 10px */
            margin-left: 1rem;
            overflow: hidden;
        }

        .progress-bar {
            background: #facc15; /* yellow-400 */
            height: 100%;
            border-radius: 9999px;
            transition: width 0.3s ease;
            width: 2%;
        }

        /* --- TARJETA 3D --- */
        .card-scene {
            perspective: 1000px;
            width: 100%;
            margin-bottom: 2rem;
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 20rem;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .card-inner.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
            border: 4px solid;
        }

        .card-front {
            background: var(--card-front-bg);
            border-color: #e0e7ff; /* indigo-100 */
            box-shadow: inset 0 0 20px rgba(0,0,0,0.05);
        }

        .card-back {
            background: linear-gradient(135deg, var(--card-back-bg1), var(--card-back-bg2));
            border-color: #eab308; /* yellow-500 */
            transform: rotateY(180deg);
        }

        .badge {
            position: absolute;
            top: 1rem;
            left: 1.5rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 0.875rem;
        }

        .badge-front { color: #818cf8; /* indigo-400 */ }
        .badge-back { color: #854d0e; /* yellow-800 */ }

        .card-text {
            font-weight: 800;
            margin-top: 1rem;
        }

        .text-front {
            color: #312e81; /* indigo-900 */
            font-size: 1.5rem;
        }

        .text-back {
            color: #0f172a; /* slate-900 */
            font-size: 1.25rem;
        }

        .hint {
            position: absolute;
            bottom: 1rem;
            color: #94a3b8; /* slate-400 */
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        .hint svg {
            width: 1rem;
            height: 1rem;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }

        /* --- CONTROLES --- */
        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            width: 100%;
        }

        .btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: bold;
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            transition: transform 0.15s, background-color 0.2s;
            font-size: 1rem;
            font-family: inherit;
        }

        .btn:hover { transform: scale(1.05); }
        .btn:active { transform: scale(0.95); }

        .btn-nav {
            background: rgba(255, 255, 255, 0.9);
            color: var(--primary);
        }
        .btn-nav:hover { background: #ffffff; }
        
        .btn-nav.next { color: var(--secondary); }

        .btn-shuffle {
            background: var(--primary);
            color: white;
        }
        .btn-shuffle:hover { background: var(--primary-hover); }

        /* --- FOOTER --- */
        footer {
            margin-top: 2rem;
            color: rgba(255, 255, 255, 0.7);
            text-align: center;
            font-size: 0.875rem;
        }
        footer .small-text {
            margin-top: 0.25rem;
            font-size: 0.75rem;
        }

        /* Responsive adjustments */
        @media (min-width: 640px) {
            h1 { font-size: 3rem; }
            .card-inner { height: 24rem; }
            .text-front { font-size: 2.25rem; }
            .text-back { font-size: 1.875rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>🛡️ Seguridad en Internet</h1>
            <p class="subtitle">Repaso interactivo para 4º de ESO</p>
            
            <div class="progress-container">
                <span id="progress-text">Tarjeta 1 de 50</span>
                <div class="progress-track">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>
            </div>
        </header>

        <main class="card-scene" onclick="flipCard()">
            <div id="card-inner" class="card-inner">
                
                <!-- Cara Frontal (Pregunta) -->
                <div class="card-face card-front">
                    <span class="badge badge-front">🤔 Pregunta</span>
                    <div id="question-text" class="card-text text-front">
                        <!-- La pregunta se inserta aquí -->
                    </div>
                    <div class="hint">
                        <span>Toca la tarjeta para ver la respuesta</span>
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122"></path></svg>
                    </div>
                </div>

                <!-- Cara Trasera (Respuesta) -->
                <div class="card-face card-back">
                    <span class="badge badge-back">💡 Respuesta</span>
                    <div id="answer-text" class="card-text text-back">
                        <!-- La respuesta se inserta aquí -->
                    </div>
                </div>

            </div>
        </main>

        <nav class="controls">
            <button onclick="prevCard()" class="btn btn-nav">
                <span>◀️</span> Anterior
            </button>
            
            <button onclick="shuffleCards()" class="btn btn-shuffle">
                <span>🔀</span> Mezclar
            </button>

            <button onclick="nextCard()" class="btn btn-nav next">
                Siguiente <span>▶️</span>
            </button>
        </nav>
        
        <footer>
            <p>Digitalización - 4º ESO</p>
            <p class="small-text">Usa las flechas ⬅️ ➡️ y la barra espaciadora ␣</p>
        </footer>
    </div>

    <script>
        const originalFlashcards = [
            { q: "¿Qué disciplina protege los sistemas informáticos y su información? 🛡️", a: "La Seguridad Informática." },
            { q: "¿Cuál suele ser el \"eslabón más débil\" en la seguridad informática? 🔗", a: "Las personas (los usuarios)." },
            { q: "¿Qué principio garantiza que solo las personas autorizadas accedan a la información? 🤫", a: "La Confidencialidad." },
            { q: "¿Qué principio asegura que la información no sea modificada sin permiso? 🧱", a: "La Integridad." },
            { q: "¿Qué principio verifica la identidad de un usuario para evitar suplantaciones? 🆔", a: "La Autenticación." },
            { q: "¿Qué principio mantiene el sistema funcionando eficientemente tras un fallo? ✅", a: "La Disponibilidad." },
            { q: "El antivirus y las contraseñas son ejemplos de seguridad... 🛑", a: "Seguridad Activa (intentan prevenir el daño)." },
            { q: "Las copias de seguridad son un ejemplo de seguridad... ⏪", a: "Seguridad Pasiva (actúan tras el incidente)." },
            { q: "¿Qué es un Hacker? 💻", a: "Experto que verifica la seguridad de los sistemas; no suele buscar causar daño." },
            { q: "¿Qué es un Pirata Informático o Cracker? 🏴‍☠️", a: "Persona que accede ilegalmente a sistemas para causar daños o robar datos." },
            { q: "¿Qué término genérico agrupa a los programas que ejecutan acciones no deseadas? 👾", a: "Software malicioso o Malware." },
            { q: "Malware que altera el funcionamiento y necesita que el usuario lo ejecute para propagarse. 🦠", a: "Virus." },
            { q: "Malware que crea copias de sí mismo para colapsar una red sin ayuda del usuario. 🪱", a: "Gusano (Worm)." },
            { q: "Malware oculto en un archivo inofensivo que realiza acciones ocultas. 🐴", a: "Troyano." },
            { q: "Ataque que secuestra los datos cifrándolos y pide un rescate económico. 💰", a: "Ransomware." },
            { q: "Programa que recopila información de nuestra navegación sin permiso. 🕵️‍♂️", a: "Spyware (Programa espía)." },
            { q: "Software que muestra publicidad no deseada, a menudo en ventanas emergentes. 📢", a: "Adware." },
            { q: "Falso antivirus que simula detectar infecciones para que pagues por la solución. 🎭", a: "Rogue." },
            { q: "Mensaje de información falsa (bulo) que se difunde para engañar o asustar. 🤥", a: "Hoax." },
            { q: "Envío masivo de correos no solicitados, normalmente con fines publicitarios. 🗑️", a: "Spam." },
            { q: "¿Qué programa previene, detecta y elimina el malware? 🩺", a: "El Antivirus." },
            { q: "Sistema de defensa que controla y filtra las conexiones de red entrantes y salientes. 🧱🔥", a: "Cortafuegos (Firewall)." },
            { q: "¿Qué medida nos permite recuperar los datos si el disco duro se rompe? 💾", a: "Copia de seguridad (Backup)." },
            { q: "¿Cuál es el número mínimo de caracteres recomendado para una contraseña segura? 🔑", a: "Ocho (8) caracteres." },
            { q: "¿Qué técnica matemática oculta datos para que solo autorizados los entiendan? 🔣", a: "Criptografía (Encriptación)." },
            { q: "¿Qué protocolo seguro debemos buscar en la URL al hacer compras online? 🔒", a: "HTTPS." },
            { q: "¿Qué icono en el navegador indica que la web tiene un certificado digital válido? 🔐", a: "Un candado cerrado." },
            { q: "Delito donde alguien se hace pasar por otra persona para fines ilegales. 👤🎭", a: "Suplantación de identidad." },
            { q: "Técnica basada en engaños para obtener información confidencial de las víctimas. 🎣", a: "Ingeniería social." },
            { q: "Fraude por email o SMS haciéndose pasar por tu banco para robar claves. 📧🎣", a: "Phishing." },
            { q: "Fraude telefónico (voz) donde suplantan identidad para obtener datos financieros. 📞", a: "Vishing." },
            { q: "Técnica que usa pendrives (USB) infectados abandonados como cebo. 💽", a: "Baiting." },
            { q: "Redes de intercambio de archivos con alto riesgo de descargar malware y violar derechos. 🔄", a: "Redes P2P." },
            { q: "¿Qué se genera si NO mantenemos actualizado el sistema operativo? ⚠️", a: "Vulnerabilidades que los atacantes aprovechan." },
            { q: "¿Es seguro usar la misma contraseña para todas las aplicaciones? 🚫", a: "No, si descubren una, accederán a todas." },
            { q: "¿Qué debes hacer si te avisan de que has ganado un sorteo en el que no participaste? 🎁", a: "Ignorarlo, suele ser una estafa para robar datos." },
            { q: "Dispositivo que da energía al ordenador durante un corte de luz. 🔋", a: "SAI (Sistema de Alimentación Ininterrumpida)." },
            { q: "Un incendio o una inundación se consideran amenazas de tipo... 🔥🌊", a: "Amenazas Físicas (Catástrofes naturales)." },
            { q: "¿Qué tipo de permisos de usuario es más seguro usar habitualmente? 📉", a: "Permisos de usuario estándar (NO administrador)." },
            { q: "Archivos que guardan info sobre tu navegación y pueden afectar a la privacidad. 🍪", a: "Las Cookies." },
            { q: "Antes de abrir un archivo descargado, debemos fijarnos en su extensión y... 📎", a: "Analizarlo con el antivirus." },
            { q: "Noticia falsa diseñada para desinformar o manipular. 📰❌", a: "Fake news." },
            { q: "Borrar datos por error o derramar líquido sobre el PC son amenazas por... 🤦‍♂️", a: "Accidentes (Amenazas físicas)." },
            { q: "Equipo lento, ventanas emergentes repentinas o navegador cambiado son indicios de... 🤒", a: "Una infección por malware." },
            { q: "Técnica que investiga equipos informáticos tras un ataque para descubrir causas y pruebas. 🕵️‍♀️💻", a: "Análisis forense digital." },
            { q: "En redes WiFi públicas, tu información no encriptada puede ser... 📡👂", a: "Interceptada por terceros." },
            { q: "Un email con faltas de ortografía, urgencia y un enlace sospechoso suele ser... 🚨", a: "Un ataque de Phishing o fraude." },
            { q: "Huellas dactilares o reconocimiento facial son ejemplos de... 👁️", a: "Autenticación biométrica." },
            { q: "Al crear una contraseña segura, además de mayúsculas y minúsculas, debemos usar... 🔡", a: "Números y símbolos." },
            { q: "¿Cuál es la herramienta más imprescindible frente a los fraudes en Internet? 🧠", a: "El sentido común." }
        ];

        let flashcards = [...originalFlashcards];
        let currentIndex = 0;
        let isFlipped = false;

        const cardInner = document.getElementById('card-inner');
        const questionText = document.getElementById('question-text');
        const answerText = document.getElementById('answer-text');
        const progressText = document.getElementById('progress-text');
        const progressBar = document.getElementById('progress-bar');

        function init() {
            updateCard();
        }

        function flipCard() {
            isFlipped = !isFlipped;
            if (isFlipped) {
                cardInner.classList.add('is-flipped');
            } else {
                cardInner.classList.remove('is-flipped');
            }
        }

        function updateCard() {
            if (isFlipped) {
                isFlipped = false;
                cardInner.classList.remove('is-flipped');
                setTimeout(() => {
                    renderText();
                }, 300);
            } else {
                renderText();
            }
        }

        function renderText() {
            questionText.innerText = flashcards[currentIndex].q;
            answerText.innerText = flashcards[currentIndex].a;
            
            const currentNum = currentIndex + 1;
            const total = flashcards.length;
            progressText.innerText = `Tarjeta ${currentNum} de ${total}`;
            progressBar.style.width = `${(currentNum / total) * 100}%`;
        }

        function nextCard() {
            currentIndex++;
            if (currentIndex >= flashcards.length) {
                currentIndex = 0;
            }
            updateCard();
        }

        function prevCard() {
            currentIndex--;
            if (currentIndex < 0) {
                currentIndex = flashcards.length - 1;
            }
            updateCard();
        }

        function shuffleCards() {
            for (let i = flashcards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [flashcards[i], flashcards[j]] = [flashcards[j], flashcards[i]];
            }
            currentIndex = 0;
            
            cardInner.style.transform = 'scale(0.95)';
            
            setTimeout(() => {
                cardInner.style.transform = ''; 
                updateCard();
            }, 150);
        }

        document.addEventListener('keydown', (event) => {
            if (event.key === 'ArrowRight') {
                nextCard();
            } else if (event.key === 'ArrowLeft') {
                prevCard();
            } else if (event.key === ' ' || event.key === 'Spacebar') {
                event.preventDefault();
                flipCard();
            }
        });

        init();
    </script>
</body>
</html>
